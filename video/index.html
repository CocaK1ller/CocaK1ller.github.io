<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频同步信息</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"> <!-- 引入 Font Awesome 图标库，可用于添加图标 -->
    <style>
        /* 新增的样式部分，用于调整字体大小和文本位置 */
    .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    .video-container {
            flex: 1; /* 让视频容器占据剩余空间 */
            margin-right: 20px; /* 与信息容器之间添加间距 */
        }
    .info-container {
            flex: 1; /* 让信息容器占据剩余空间 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 垂直居中 */
            align-items: center; /* 水平居中 */
            text-align: center; /* 文本居中 */
        }
    .info-container #info {
            font-size: 20px; /* 增大信息区域的字体大小 */
        }
    .toggle-info-btn {
            margin-top: 10px; /* 按钮与信息区域的间距 */
        }
        /* 为标题添加样式 */
      .info-container h1 {
            font-size: 30px; /* 一级标题的字体大小 */
            margin-bottom: 10px; /* 一级标题的下边距 */
        }
      .info-container h2 {
            font-size: 24px; /* 二级标题的字体大小 */
            margin-bottom: 5px; /* 二级标题的下边距 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-container">
            <video id="video" controls preload="metadata">
                <source src="4.mp4" type="video/mp4">
                您的浏览器不支持视频标签。
            </video>
        </div>
        <div class="info-container">
            <div id="info">
                <!-- 信息内容将根据视频时间动态更新 -->
            </div>
            <button id="toggle-info-btn"><i class="fas fa-info-circle"></i> 显示/隐藏信息</button> <!-- 添加信息切换按钮 -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
